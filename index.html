<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuizLand</title>

  <!-- Favicon / Tab Logo -->
  <link rel="icon" type="image/png" class = logo  href="logo.png">

<!-- popsound               wrongspell         -->
<audio id="popSound" src="popclickk.mp3"></audio>

<!-- bg audio   -->      
 <!-- bgMusic -->
<audio id="bgMusic" loop autoplay>
             <!-- wrong spell -->
    <source src="bgMusicc.mp3" type="audio/mpeg">
</audio>        

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- bg image -->
<div class="game">
<img src="background.png" class="background">

<!-- settting -->
<!-- <img src="settings.png" class="settingsBtn"> -->
<img src="settings.png" class="settingsBtn" onclick="openSettings()">

<!-- teachers login -->
<img src="teacherslogin.png" class="teacherLoginBtn" onclick="openTeacherLogin()">

<div class="menu">
<!-- image -->
<button class="btn alphabet" onclick="openLesson('alphabet')">
<img src="alphabet.png" class="icon">
</button>

<button class="btn numbers" onclick="openNumberLesson()">
<img src="numbers.png" class="icon">
</button>

<button class="btn colors" onclick="openColorsLesson()">
<img src="colors.png" class="icon">
</button>

<button class="btn shapes" onclick="openShapesLesson()">
<img src="shapes.png" class="icon">
</button>

</div>

<!-- SETTINGS PANEL -->
<div id="settingsPanel" class="settingsPanel">

  <img src="settingbg.png" class="settingsBG">

  <div class="settingsContent">

    <!-- MUSIC -->
    <div class="settingRow">
      <span> Music</span>
      <button onclick="toggleMusic()" id="musicBtn" class="toggle on">ON</button>
    </div>

    <!-- SOUND -->
    <div class="settingRow">
      <span> Sound</span>
      <button onclick="toggleSound()" id="soundBtn" class="toggle on">ON</button>
    </div>

    <!-- FULLSCREEN -->
    <div class="settingRow">
      <span> Fullscreen</span>
      <button onclick="toggleFullscreen()" id="fullscreenBtn" class="toggle">OFF</button>
    </div>

    <!-- BUTTONS -->
    <div class="settingsButtons">
        <button onclick="closeSettings()" class="backBtn">
    <img src="backbtn.png">
    </button>

    <button onclick="continueGame()" class="continueBtn">
        <img src="continuebtn.png" alt="Continue">
    </button>
</div>
    </div>

  </div>
</div>

<!-- quiz button -->
<button class="quizBtn" onclick="startQuiz()">
<img src="quizbtn.png">
</button>

<!-- play buttonnn -->
<button class="playBtn" onclick="startPlaytime()">
  <img src="playbtn.png">
</button>
</div>

<!-- PLAYTIME DASHBOARD -->
<div id="playDashboard" class="playDashboard">

  <div class="playGrid">

    <button onclick="startGame('color')" class="playCard">🎨 Color</button>
    <button onclick="startGame('number')" class="playCard">🔢 Number</button>
    <button onclick="startGame('alphabet')" class="playCard">🔤 Alphabet</button>
    <button onclick="startGame('shape')" class="playCard">🔺 Shape</button>

  </div>

  <button onclick="closePlaytime()" class="exitBtn">Back</button>
</div>


<!-- GAME SCREEN -->
<div id="playGame" class="playGame">

  <h2 id="gameQuestion"></h2>

  <div id="gameChoices" class="gameChoices"></div>

  <button onclick="closeGame()" class="exitBtn">Exit</button>

</div>

 <!-- QUIZ BOARD -->
<div id="quizBoard" class="quizBoard">

  <h2 id="quizTopic"></h2>

  <p id="questionText"></p>

  <div id="answers" class="answers"></div>

  <p id="quizProgress"></p>

  <button onclick="closeQuiz()" class="exitBtn">Exit</button>

</div>

<!-- TEACHER LOGIN -->
<div id="teacherOverlay" class="teacherOverlay">
  <div class="teacherBox">

    <!-- CLOSE BUTTON -->
    <button class="closeBtn" onclick="closeTeacherLogin()">✕</button>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="formContainer">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">

      <button class="mainBtn" onclick="loginTeacher()">Login</button>

      <p class="switchText">
        No account? <span onclick="showRegister()">Register</span>
      </p>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="formContainer" style="display:none">
      <input type="email" id="regEmail" placeholder="Email">
      <input type="password" id="regPassword" placeholder="Password">
      <input type="password" id="repeatPassword" placeholder="Repeat Password">

      <button class="mainBtn" onclick="registerTeacher()">Register</button>

      <p class="switchText">
        Already have an account? <span onclick="showLogin()">Login</span>
      </p>
    </div>

  </div>
</div>

<!-- voiceeee -->
<button id="micBtn" onclick="startListening()" class="micBtn">🎤 Speak Answer</button>


<!-- ALPHABET LESSON -->

<div id="alphabetLesson" class="alphabetLesson">
<h1 id="letterDisplay">A</h1>
<h2 id="wordDisplay">Apple</h2>

<div id="alphabetObjects"></div>

<br>

<button onclick="speakLetter()">🔊 Speak</button>
<button onclick="startVoice()">🎤 Say Letter</button>

<br><br>

<button onclick="prevLetter()">⬅ Previous</button>
<button onclick="nextLetter()">Next ➡</button>

<br><br>

<button onclick="closeLesson()">Exit Lesson</button>

</div>

<!-- NUMBER LESSON -->

<div id="numberLesson" class="numberLesson">
<h1 id="numberDisplay">1</h1>
<h2 id="numberWord">One Apple</h2>
<div id="numberObjects" class="numberObjects"></div>
<button onclick="speakNumber()">🔊 Speak</button>
<br><br>
<button onclick="prevNumber()">⬅ Previous</button>
<button onclick="nextNumber()">Next ➡</button>
<br><br>

<button onclick="closeNumberLesson()">Exit Lesson</button>
</div>

<!-- color lesson -->
<div id="colorsLesson" class="colorsLesson">
<h1 id="colorName">Red Apple</h1>
<div id="colorBox" class="colorBox"></div>
<div id="colorEmoji" style="font-size:80px;">🍎</div>
<!-- space -->
<div id="colorEmoji"></div>  

<button onclick="speakColor()">🔊 Speak</button>
<br><br>

<button onclick="prevColor()">⬅ Previous</button>
<button onclick="nextColor()">Next ➡</button>

<br><br>

<button onclick="closeColorsLesson()">Exit Lesson</button>

</div>

<!-- SHAPES LESSON -->

<div id="shapesLesson" class="shapesLesson">

<h1 id="shapeName">Circle</h1>

<div id="shapeDisplay" class="shapeDisplay"></div>

<button onclick="speakShape()">🔊 Speak</button>

<br><br>

<button onclick="prevShape()">⬅ Previous</button>
<button onclick="nextShape()">Next ➡</button>

<br><br>

<button onclick="closeShapesLesson()">Exit Lesson</button>
<div id="shapeDisplay" class="shapeDisplay" onclick="speakShape()"></div>

</div>
<script src="script.js" defer></script>


</body>

</html>
